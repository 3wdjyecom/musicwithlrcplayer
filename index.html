<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <script src="./js/somethingneeded.js"></script>
    <link rel="stylesheet" href="./css/huakuai.css">
    <link rel="stylesheet" href="./css/firststyle.css">
</head>
<body>
    <h1>HTML music and lrc player</h1>
    <label class="toggle-switch">
    <input type="checkbox" id="musicSwitch">
    <span class="slider"></span>
  </label>
  <span id="status">开关状态：关闭</span><br>
  <a href="./attention.html"><button>公告</button></a>
  <div class="nouse-div hidden-div">
    <div>选择mp3文件</div>
    <input type="file" id="audioFile" value="选择歌曲文件">
    <div>选择lrc文件</div>
    <input type="file" id="lrcfile" value="选择歌词文件">
    <div>选择lrc翻译文件</div>
    <input type="file" id="trans" value="选择翻译文件"><br>
    <div>选择字体颜色</div>
    <input type="color" id="fontColor"><br>
    <input type="color" id="tfontColor"><br>
</div>
    <div class="imgAndLrcBox">
        <img id="coverImg">
        <div class="textContainer">
            <div id="title" style="flex: 1;text-align: center;font-size: large;">歌曲标题</div>
            <div id="artist" style="flex: 1;text-align: center;">艺术家</div>
            <div id="album" style="flex: 1;text-align: center;font-size: small;">专辑</div>
            <div id = "currentlrc"></div>
            <div id = "currentlrc2"></div>
        </div>
    </div>
    <br>
    <audio id="audio" controls></audio>
    <div class="nouse-div hidden-div">
    <button onclick="downloadLrc()">下载歌词</button>
    <div id="lrcContent"></div>
    <div>翻译</div>
    <div id="lrcContent2"></div>
    <button onclick="openset()">设置</button>
    
</div>
<div id="setting" style="display: none;">
        <div class="content">设置内容</div>
        <h4>主题设置</h4>
        <button id="SabTh" onclick="sabth()">Sabbat of the Witch</button>
        <button id="srbk" onclick="srbk()">Senren  Banka</button>
        <button id="notany" onclick="notany()">No theme</button><br>
        <button onclick="document.getElementById('setting').style.display = 'none';">关闭</button>
    </div>
<script src="./js/lrcabout.js"></script>
<script src="./js/musicplay.js"></script>
<script src="./js/IDV3getouthere.js"></script>
<script src="./js/huakuai.js"></script>
<script src="./js/background.js"></script>
<script src="./js/setting.js">

</script>
</body>
</html>
